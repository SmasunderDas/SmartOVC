<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartOVC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding-top: 190px;
            height: 300vh;
            background: black;
            color: white;
            left: 50%;

        }

        img {
            background-size: cover;
            height: 100%;

        }

        nav {
            text-align: right;
        }



        div {
            background-color: black;
            position: fixed;
            width: 100%;
            top: 0;
            right: 0px;
        }


        button {
            color: white;
            background: linear-gradient(to right, red, rgb(255, 0, 221));
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }

        h1,
        h2 {
            scroll-margin-top: 170px;

        }

        p {
            font-size: 100px;
            scroll-margin-top: 170px;
            text-decoration-color: red;
            text-decoration-line: underline;
            text-transform: uppercase;

        }

        text {
            color: white;
            font-size: 30px;
        }

        input {
            padding: 30px;
            width: 600px;
            border-radius: 30px;
            font-size: 20px;
        }

        input:hover {
            transform: scale(1.01);
        }

        a {
            right: 50%;
        }

        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* সম্পূর্ণ কালো ব্যাকগ্রাউন্ড */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* যেন এটি সবার উপরে থাকে */
            transition: opacity 1s ease;
            /* ধীরে ধীরে ভ্যানিশ হওয়ার জন্য */
        }

        .splash-logo {
            width: 150px;
            /* লোগোর সাইজ */
            animation: pulse 2s infinite;
            /* লোগোটি কাঁপবে বা বড়-ছোট হবে */
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div id="splash-screen">
        <h1><img src="Smart.png" alt="SmartOVC Logo" class="splash-logo" padding=""></h1>
        <h1 style="color: #00FF00;"></h1>
    </div>
    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                var splash = document.getElementById('splash-screen');
                splash.style.opacity = '0'; // ধীরে ধীরে মুছে যাবে
                setTimeout(function () {
                    splash.style.display = 'none'; // পুরোপুরি সরিয়ে দেবে
                }, 1000);
            }, 3000); // ৩ সেকেন্ড পর বন্ধ হবে
        });
    </script>
    <div class="fixed">
        <a href="#home"><img src="Smart1.png" alt="SmartOVC" width="200" height="100"></a><br><br>

        <a href="#home"><button>Home</button></a>
        <a href="#Video"><button>Video</button></a>
        <a href="#SmartFC"><button>SmartFC </button></a>
        <button>Robot</button>
        <a href="learn.html"><button>Chatbot</button></a>
        <button>SAI</button>
        <hr>
    </div>
    <h1 id="home">Home</h1>
    <h2>আমার কোম্পানির ও পরিকল্পনা তালিকা: </h2>
    <ol type="1">
        <li>SmartOVC</li>
        <li>SmartFC</li>
        <li>SpaceBR</li>
        <li>Robot</li>
        <li>AI</li>
    </ol>
    <h2 id="Video">1. SmartOVC: </h2>
    <p id="SmartFC"> SmartOVC</p>
    <text>
        SmartOVC: <br><br>
        SmartOVC is best Company in the future.
    </text><br><br>
    <input type="text" placeholder="Aks SmartOVC....." required>

</body>

</html>
